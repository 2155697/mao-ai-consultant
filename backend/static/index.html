<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教员 - 一对一AI咨询</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mao: { 400: '#f87171', 500: '#dc2626', 600: '#b91c1c', 700: '#991b1b', 800: '#7f1d1d', 900: '#450a0a', 950: '#1a0303' },
            gold: { 400: '#fbbf24', 500: '#f59e0b' },
            dark: { 800: '#141414', 700: '#1a1a1a', 600: '#262626', 500: '#333' }
          },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'], serif: ['Noto Serif SC','Georgia','serif'] }
        }
      }
    }
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body,#root { height:100%; width:100%; }
    body { font-family:'Inter',system-ui,sans-serif; background:#0a0a0a; color:#e5e5e5; overflow:hidden; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
    ::selection { background:rgba(220,38,38,0.3); color:#fff; }

    @keyframes glow { 0%{box-shadow:0 0 5px rgba(220,38,38,0.3)} 100%{box-shadow:0 0 20px rgba(220,38,38,0.6),0 0 40px rgba(220,38,38,0.2)} }
    @keyframes slideUp { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    @keyframes nodePulse { 0%{box-shadow:0 0 0 0 rgba(220,38,38,0.4)} 70%{box-shadow:0 0 0 10px rgba(220,38,38,0)} 100%{box-shadow:0 0 0 0 rgba(220,38,38,0)} }
    @keyframes messageSlide { 0%{opacity:0;transform:translateY(20px)scale(0.95)} 100%{opacity:1;transform:translateY(0)scale(1)} }
    @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
    @keyframes typingDot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    @keyframes spin { to{transform:rotate(360deg)} }

    .animate-glow { animation:glow 2s ease-in-out infinite alternate }
    .animate-slide-up { animation:slideUp 0.5s ease-out both }
    .animate-fade-in { animation:fadeIn 0.3s ease-out both }
    .animate-node-pulse { animation:nodePulse 1.5s infinite }
    .animate-shimmer { background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent); background-size:200% 100%; animation:shimmer 1.5s linear infinite }
    .animate-spin { animation:spin 1s linear infinite }
    .message-enter { animation:messageSlide 0.4s cubic-bezier(0.16,1,0.3,1) both }
    .typing-cursor::after { content:'|'; animation:blink 1s infinite; color:#dc2626; margin-left:2px }
    .gradient-text { background:linear-gradient(135deg,#f87171,#dc2626,#fbbf24); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text }

    .progress-bar { transition:width 0.5s cubic-bezier(0.4,0,0.2,1) }
    .step-connector { position:absolute; left:15px; top:36px; bottom:-8px; width:2px; background:linear-gradient(to bottom,rgba(220,38,38,0.4),rgba(220,38,38,0.1)); transform-origin:top; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8000/api/v1' : '/api/v1';

    // ===== 图标组件 =====
    const Icons = {
      BookOpen: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      User: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      Send: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
      Loader2: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
      Zap: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      Search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Target: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
      Brain: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-4.04z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-4.04z"/></svg>,
      Compass: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>,
      Lightbulb: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>,
      Sparkles: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>,
      CheckCircle2: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
      Quote: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/></svg>,
    };

    const STEP_DEFS = [
      { id:'deconstruct', name:'问题解构', desc:'分析问题的性质和本质', pct:15, quote:'调查就是解决问题', icon:'Search' },
      { id:'contradiction', name:'矛盾识别', desc:'找出主要矛盾和矛盾的主要方面', pct:35, quote:'事物的性质，主要地是由取得支配地位的矛盾的主要方面所规定的', icon:'Target' },
      { id:'deep_analysis', name:'深度分析', desc:'分析有利条件和不利条件', pct:55, quote:'没有调查就没有发言权', icon:'Brain' },
      { id:'strategy', name:'策略构建', desc:'制定战略方向和具体战术', pct:75, quote:'战略上要藐视敌人，战术上要重视敌人', icon:'Compass' },
      { id:'conclusion', name:'总结升华', desc:'提炼本质，指明方向', pct:100, quote:'道路是曲折的，前途是光明的', icon:'Lightbulb' },
    ];

    // ===== 思考面板组件 =====
    function ThinkingPanel({ steps, overallProgress, phase }) {
      const latestStep = steps[steps.length-1];
      const completedCount = steps.filter(s=>s.status==='completed').length;
      const isDone = phase==='done';

      return (
        <div className="max-w-2xl mx-auto animate-slide-up" style={{animationDelay:'0.1s'}}>
          <div className="rounded-2xl border border-dark-600/50 bg-dark-800/60 backdrop-blur-sm overflow-hidden">
            {/* 头部 */}
            <div className="px-5 py-4 border-b border-dark-600/40">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-2.5">
                  {isDone ? <span className="text-green-500"><Icons.CheckCircle2/></span>
                   : phase==='writing' ? <span className="text-gold-400 animate-pulse"><Icons.Zap/></span>
                   : <span className="text-mao-400"><Icons.Sparkles/></span>}
                  <span className="text-sm font-medium text-gray-300">
                    {phase==='thinking'?'正在思考...':phase==='writing'?'组织语言...':phase==='done'?'思考完成':'准备中...'}
                  </span>
                </div>
                <span className="text-xs text-gray-500 font-mono">{Math.round(overallProgress)}%</span>
              </div>
              {/* 进度条 */}
              <div className="relative h-1.5 bg-dark-700 rounded-full overflow-hidden">
                <div className="h-full rounded-full bg-gradient-to-r from-mao-600 via-mao-500 to-gold-500 progress-bar" style={{width:`${overallProgress}%`}}/>
                {overallProgress>0 && overallProgress<100 && <div className="absolute top-0 h-full w-20 animate-shimmer rounded-full"/>}
              </div>
            </div>

            {/* 步骤 */}
            <div className="px-5 py-4 space-y-2">
              {steps.map((step, idx) => {
                const isCompleted = step.status==='completed';
                const isActive = step.status==='active';
                const IconComp = Icons[step.icon] || Icons.Search;
                const colorMap = {
                  deconstruct:'text-amber-400 border-amber-700/30 bg-amber-600/20',
                  contradiction:'text-orange-400 border-orange-700/30 bg-orange-600/20',
                  deep_analysis:'text-red-400 border-red-700/30 bg-red-600/20',
                  strategy:'text-rose-400 border-rose-700/30 bg-rose-600/20',
                  conclusion:'text-yellow-400 border-yellow-600/30 bg-yellow-600/20',
                };
                const colorCls = colorMap[step.id] || 'text-gray-500 border-gray-700/30 bg-gray-600/20';

                return (
                  <div key={step.id} className="relative animate-slide-up" style={{animationDelay:`${idx*0.1}s`}}>
                    {idx < steps.length-1 && <div className="step-connector"/>}
                    <div className="flex items-start gap-3">
                      <div className={`relative flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center border ${isCompleted||isActive ? colorCls : 'bg-dark-700/50 border-dark-600/30 text-gray-600'} ${isActive?'animate-node-pulse':''}`}>
                        {isCompleted ? <Icons.CheckCircle2/> : <IconComp/>}
                      </div>
                      <div className="flex-1 min-w-0 pt-1">
                        <div className="flex items-center gap-2 mb-1">
                          <span className={`text-sm font-medium ${isCompleted?'text-gray-300':isActive?'text-white':'text-gray-600'}`}>{step.name}</span>
                          {isActive && <span className="text-xs text-mao-500 animate-pulse">思考中...</span>}
                        </div>
                        <p className={`text-xs ${isCompleted?'text-gray-500':isActive?'text-gray-400':'text-gray-700'}`}>{step.description}</p>
                        {step.content && (isActive||isCompleted) && (
                          <div className="mt-2 animate-fade-in">
                            <div className={`p-3 rounded-xl text-xs leading-relaxed ${isActive ? `bg-gradient-to-r ${colorCls}` : 'bg-dark-700/30 border border-dark-600/20'}`}>
                              <div className="flex items-start gap-2">
                                <div className={`w-5 h-5 rounded flex items-center justify-center flex-shrink-0 mt-0.5 ${colorCls}`}><IconComp/></div>
                                <div className="flex-1 text-gray-300">{step.content}{isActive&&<span className="typing-cursor"/>}</div>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
              {completedCount<5 && phase!=='done' && (
                <div className="flex items-center gap-3 py-2 opacity-40">
                  <div className="w-8 h-8 rounded-lg bg-dark-700/50 flex items-center justify-center"><div className="w-2 h-2 rounded-full bg-dark-600"/></div>
                  <div className="flex-1"><div className="h-4 w-32 bg-dark-700/50 rounded"/></div>
                </div>
              )}
            </div>

            {/* 名言 */}
            {latestStep?.mao_quote && (
              <div className="px-5 py-3 border-t border-dark-600/40 bg-dark-900/30">
                <p className="text-xs text-mao-400/70 italic font-serif text-center">"{latestStep.mao_quote}"</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ===== 消息气泡组件 =====
    function MessageBubble({ message }) {
      const isUser = message.role==='user';
      const formatContent = (content) => {
        const lines = content.split('\n');
        return lines.map((line, i) => {
          if (line.startsWith('## ')) return <h3 key={i} className="text-base font-bold text-mao-300 mt-4 mb-2 flex items-center gap-2"><span className="w-1 h-4 bg-mao-500 rounded-full"/>{line.slice(3)}</h3>;
          if (line.startsWith('> ')) return <blockquote key={i} className="border-l-2 border-mao-600/40 pl-3 my-2 text-mao-300/80 italic text-xs">{line.slice(2)}</blockquote>;
          if (line.match(/^\d+\.\s/)) {
            const num = line.match(/^\d+/)[0];
            return <div key={i} className="flex items-start gap-2 my-1.5"><span className="flex-shrink-0 w-5 h-5 rounded-full bg-mao-800/40 text-mao-400 text-xs flex items-center justify-center font-medium">{num}</span><span className="text-gray-300 pt-0.5">{line.replace(/^\d+\.\s/,'')}</span></div>;
          }
          if (line.trim()==='') return <div key={i} className="h-2"/>;
          return <p key={i} className="my-1">{line}</p>;
        });
      };

      return (
        <div className={`flex gap-3 message-enter ${isUser?'flex-row-reverse':''}`}>
          <div className="flex-shrink-0">
            {isUser
              ? <div className="w-9 h-9 rounded-full bg-dark-600 border border-dark-500/50 flex items-center justify-center"><Icons.User/></div>
              : <div className="w-9 h-9 rounded-full bg-gradient-to-br from-mao-700 to-mao-900 flex items-center justify-center border border-mao-600/30"><Icons.BookOpen/></div>
            }
          </div>
          <div className={`flex-1 max-w-[80%] ${isUser?'items-end':'items-start'} flex flex-col`}>
            <div className={`flex items-center gap-1.5 mb-1.5 ${isUser?'flex-row-reverse':''}`}>
              <span className={`text-xs font-medium ${isUser?'text-gray-500':'text-mao-400'}`}>{isUser?'小同志':'教员'}</span>
            </div>
            <div className={`relative px-4 py-3 rounded-2xl text-sm leading-relaxed ${isUser?'bg-mao-800/30 border border-mao-700/20 text-gray-300 rounded-tr-sm':'bg-dark-700/50 border border-dark-600/30 text-gray-200 rounded-tl-sm'}`}>
              {!isUser && <div className="absolute -top-2 -left-1"><Icons.Quote/></div>}
              <div className="whitespace-pre-wrap">{formatContent(message.content)}</div>
              {!isUser && <div className="mt-3 pt-2 border-t border-dark-600/20 flex items-center gap-1.5"><div className="w-1.5 h-1.5 rounded-full bg-mao-700/50"/><span className="text-[10px] text-gray-600 italic">实事求是 · 群众路线 · 矛盾分析</span></div>}
            </div>
          </div>
        </div>
      );
    }

    // ===== 主聊天界面 =====
    function ChatInterface() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [currentThinking, setCurrentThinking] = useState([]);
      const [overallProgress, setOverallProgress] = useState(0);
      const [thinkingPhase, setThinkingPhase] = useState('idle');
      const [showWelcome, setShowWelcome] = useState(true);
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => { messagesEndRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages, currentThinking]);
      useEffect(() => { if(inputRef.current){inputRef.current.style.height='auto';inputRef.current.style.height=inputRef.current.scrollHeight+'px';} }, [input]);

      const handleSend = useCallback(async () => {
        if(!input.trim() || isLoading) return;
        const userMsg = { id:Date.now().toString(), role:'user', content:input.trim(), timestamp:new Date().toISOString() };
        setMessages(p=>[...p, userMsg]);
        setInput('');
        setIsLoading(true);
        setShowWelcome(false);
        setCurrentThinking([]);
        setOverallProgress(0);
        setThinkingPhase('thinking');

        let assistantContent = '';
        try {
          const response = await fetch(`${API_BASE}/chat/stream`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ message:userMsg.content, stream:true, show_thinking:true })
          });
          if(!response.ok) throw new Error('请求失败');
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let assistantId = (Date.now()+1).toString();

          while(true) {
            const {done, value} = await reader.read();
            if(done) break;
            const chunk = decoder.decode(value, {stream:true});
            const lines = chunk.split('\n\n');
            for(const line of lines) {
              if(!line.trim() || !line.startsWith('data:')) continue;
              try {
                const data = JSON.parse(line.slice(5));
                if(data.type==='thinking' && data.thinking_step) {
                  setCurrentThinking(prev => {
                    const existing = prev.findIndex(s=>s.id===data.thinking_step.id);
                    if(existing>=0){ const u=[...prev]; u[existing]={...data.thinking_step, status:'completed'}; return u; }
                    return [...prev, {...data.thinking_step, status:'active'}];
                  });
                  setOverallProgress(data.overall_percentage||0);
                } else if(data.type==='content' && data.data) {
                  setThinkingPhase('writing');
                  assistantContent += data.data;
                  setMessages(prev => {
                    const last = prev[prev.length-1];
                    if(last?.role==='assistant' && last.id===assistantId) {
                      const u=[...prev]; u[u.length-1]={...last, content:assistantContent}; return u;
                    }
                    return [...prev, {id:assistantId, role:'assistant', content:assistantContent, timestamp:new Date().toISOString()}];
                  });
                } else if(data.type==='done') {
                  setThinkingPhase('done');
                  setOverallProgress(100);
                } else if(data.type==='error') throw new Error(data.error||'未知错误');
              } catch(e){}
            }
          }
        } catch(err) {
          setMessages(p=>[...p, {id:(Date.now()+2).toString(), role:'assistant', content:`小同志，网络出了点问题。请检查后端服务是否启动。\n\n错误：${err.message}`, timestamp:new Date().toISOString()}]);
        } finally {
          setIsLoading(false);
          setCurrentThinking([]);
          setThinkingPhase('idle');
        }
      }, [input, isLoading, messages]);

      const handleKeyDown = (e) => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();} };

      return (
        <div className="h-full flex flex-col max-w-5xl mx-auto w-full">
          {/* 头部 */}
          <header className="flex items-center justify-between px-6 py-4 border-b border-dark-600/50">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-gradient-to-br from-mao-700 to-mao-900 flex items-center justify-center border border-mao-600/30 animate-glow">
                <span className="text-gold-400"><Icons.BookOpen/></span>
              </div>
              <div>
                <h1 className="text-lg font-bold text-white tracking-wide">教员<span className="text-mao-400 text-sm font-normal ml-2">一对一咨询</span></h1>
                <div className="flex items-center gap-1.5 text-xs text-gray-500"><span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"/><span>AI驱动 · 毛泽东思想</span></div>
              </div>
            </div>
            <div className="flex items-center gap-2 text-xs text-gray-600"><Icons.Zap/><span>Stream</span></div>
          </header>

          {/* 消息区 */}
          <div className="flex-1 overflow-y-auto px-4 py-6 space-y-6">
            {showWelcome && messages.length===0 && (
              <div className="flex flex-col items-center justify-center h-full min-h-[400px] gap-8 animate-fade-in">
                <div className="relative">
                  <div className="w-24 h-24 rounded-full bg-gradient-to-br from-mao-600 via-mao-800 to-dark-900 flex items-center justify-center border-2 border-mao-500/40 shadow-2xl shadow-mao-900/50">
                    <span className="text-gold-400 scale-150"><Icons.BookOpen/></span>
                  </div>
                  <div className="absolute -inset-3 rounded-full border border-dashed border-mao-700/30" style={{animation:'spin 20s linear infinite'}}/>
                </div>
                <div className="text-center space-y-3">
                  <h2 className="text-3xl font-bold gradient-text font-serif">小同志，你遇到什么问题</h2>
                  <p className="text-gray-500 text-sm max-w-md">说来听听，我帮你分析分析。没有调查就没有发言权嘛。</p>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full max-w-lg">
                  {['最近工作压力很大，感觉快撑不住了','不知道该怎么选择，很迷茫','想学习提升，但不知道从何开始','遇到了批评和挫折，很难过'].map((q,i)=>[
                    <button key={i} onClick={()=>{setInput(q);inputRef.current?.focus();}} className="text-left px-4 py-3 rounded-xl glass-light text-sm text-gray-400 hover:text-white hover:border-mao-600/40 border border-dark-600/50 transition-all duration-300 hover:shadow-lg hover:shadow-mao-900/20">{q}</button>
                  ])}
                </div>
              </div>
            )}

            {messages.map((msg, idx)=>[
              <MessageBubble key={msg.id} message={msg}/>
            ])}

            {currentThinking.length>0 && (
              <ThinkingPanel steps={currentThinking} overallProgress={overallProgress} phase={thinkingPhase}/>
            )}

            {isLoading && currentThinking.length===0 && (
              <div className="flex items-center gap-3 px-4 py-3 animate-fade-in">
                <span className="text-mao-500"><Icons.Loader2/></span>
                <span className="text-sm text-gray-500">正在思考...</span>
              </div>
            )}
            <div ref={messagesEndRef}/>
          </div>

          {/* 输入区 */}
          <div className="px-4 pb-4 pt-2">
            <div className="relative max-w-3xl mx-auto">
              <div className="relative flex items-end gap-2 bg-dark-800/80 border border-dark-600/60 rounded-2xl p-3 backdrop-blur-sm focus-within:border-mao-600/50 focus-within:shadow-lg focus-within:shadow-mao-900/20 transition-all duration-300">
                <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKeyDown}
                  placeholder="小同志，说说你的问题..." rows={1}
                  className="flex-1 bg-transparent text-sm text-gray-200 placeholder-gray-600 resize-none max-h-32 py-2 px-1 leading-relaxed outline-none"
                  disabled={isLoading}/>
                <button onClick={handleSend} disabled={!input.trim()||isLoading}
                  className="flex-shrink-0 w-9 h-9 rounded-xl bg-mao-700 hover:bg-mao-600 disabled:bg-dark-600 disabled:opacity-50 flex items-center justify-center transition-all duration-200 hover:shadow-lg hover:shadow-mao-900/30 active:scale-95">
                  {isLoading?<span className="text-white"><Icons.Loader2/></span>:<span className="text-white"><Icons.Send/></span>}
                </button>
              </div>
              <p className="text-center text-xs text-gray-700 mt-2">按 Enter 发送 · Shift+Enter 换行</p>
            </div>
          </div>
        </div>
      );
    }

    // ===== 渲染 =====
    function App() {
      return (
        <div className="h-screen w-screen bg-dark-900 flex flex-col overflow-hidden">
          <div className="h-[2px] w-full bg-gradient-to-r from-transparent via-mao-600 to-transparent opacity-60"/>
          <main className="flex-1 overflow-hidden"><ChatInterface/></main>
          <div className="h-[1px] w-full bg-gradient-to-r from-transparent via-mao-800 to-transparent opacity-40"/>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
